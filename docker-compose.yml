version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: podcast_backend
    ports:
      - "8001:8001"
    volumes:
      # Mount source code for hot reload
      - ./app:/app/app
      - ./rag:/app/rag
      - ./worker:/app/worker
      - ./config.py:/app/config.py
      
      # Mount persistent data directories
      - ./db:/app/db
      - ./static:/app/static
      - ./uploads:/app/uploads
      
      # Mount model cache (optional, to avoid re-downloading)
      - ./local_model:/app/local_model
      
      # Mount .env file
      - ./.env:/app/.env
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - podcast_network

networks:
  podcast_network:
    driver: bridge

volumes:
  db_data:
  static_data:
  uploads_data:
